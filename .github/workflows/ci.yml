name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: ./test.sh
      - run: ./build.sh
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: trustanycert-${{ github.sha }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 14
