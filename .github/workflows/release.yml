name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify tag matches module.prop
        run: |
          TAG="${GITHUB_REF_NAME}"
          MOD_VER=$(awk -F= '/^version=/ {print $2}' module.prop | tr -d '[:space:]')
          if [ "$TAG" != "$MOD_VER" ]; then
            echo "::error::Tag ($TAG) does not match module.prop version ($MOD_VER)"
            echo "Bump module.prop and update.json before tagging."
            exit 1
          fi
          echo "OK: tag=$TAG matches module.prop=$MOD_VER"

      - run: ./test.sh
      - run: ./build.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
